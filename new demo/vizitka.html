<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вячеслав Демин — Эксперт по ИИ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: rgba(255,255,255,0.07);
      --accent1: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #a855f7;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px 40px;
      text-align: center;
      overflow: hidden;
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* Card top glow line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent1), var(--accent2), transparent);
      animation: glowLine 3s ease-in-out infinite alternate;
    }
    @keyframes glowLine {
      from { opacity: 0.5; left: 10%; right: 10%; }
      to   { opacity: 1;   left: 5%;  right: 5%;  }
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
    }
    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(var(--accent1), var(--accent2), var(--accent3), var(--accent1));
      animation: spin 4s linear infinite;
      z-index: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--card);
    }
    .avatar {
      position: relative;
      z-index: 1;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      user-select: none;
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 60%;
      border-radius: 50%;
    }

    /* Status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.25);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--accent2);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(6,182,212,0.5); }
      50%      { box-shadow: 0 0 0 5px rgba(6,182,212,0); }
    }

    /* Name */
    .name {
      font-size: clamp(26px, 6vw, 34px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(124,58,237,0.4));
      margin-bottom: 10px;
      animation: nameGlow 3s ease-in-out infinite alternate;
    }
    @keyframes nameGlow {
      from { filter: drop-shadow(0 0 12px rgba(124,58,237,0.3)); }
      to   { filter: drop-shadow(0 0 28px rgba(6,182,212,0.5)); }
    }

    /* Specialization */
    .spec {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 32px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }
    .spec strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .social-btn:hover {
      transform: translateY(-4px) scale(1.1);
      color: #fff;
      border-color: transparent;
    }
    .social-btn.tg::before  { background: linear-gradient(135deg, #229ED9, #1a7fc1); }
    .social-btn.vk::before  { background: linear-gradient(135deg, #4680C2, #2E5C9E); }
    .social-btn.yt::before  { background: linear-gradient(135deg, #FF0000, #cc0000); }
    .social-btn.ig::before  { background: linear-gradient(135deg, #f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
    .social-btn:hover::before { opacity: 1; }
    .social-btn svg { position: relative; z-index: 1; }

    /* CTA button */
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px 28px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.2px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.3);
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent2), var(--accent1));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cta:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(124,58,237,0.45);
    }
    .cta:hover::before { opacity: 1; }
    .cta:active { transform: scale(0.98); }
    .cta span, .cta svg { position: relative; z-index: 1; }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: rgba(148,163,184,0.4);
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; border-radius: 20px; }
    }
  </style>
</head>

<script>
  // Particles
  const container = document.getElementById('particles');
  const colors = ['#7c3aed','#06b6d4','#a855f7','#3b82f6'];
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 1;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*15+10}s;
      animation-delay:${Math.random()*10}s;
    `;
    container.appendChild(p);
  }

  // Ripple on CTA
  document.getElementById('ctaBtn').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(r);
    setTimeout(() => r.remove(), 700);
  });
</script>
